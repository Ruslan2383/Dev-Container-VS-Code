version: "3.9"

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./apps/backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: prod

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: prod
    depends_on:
      - backend
